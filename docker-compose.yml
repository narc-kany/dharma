services:
  # Service 1: Your Custom GraphRAG Backend Engine
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/workspace
    env_file:
      - ./backend/.env
    depends_on:
      - neo4j
    networks:
      - graphrag-network

  # Service 2: The Graph Database
  neo4j:
    image: neo4j:5.12.0-community
    ports:
      - "7474:7474" # HTTP Dashboard
      - "7687:7687" # Bolt connection protocol
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    environment:
      - NEO4J_AUTH=neo4j/graphrag_password123
      - NEO4J_PLUGINS=["apoc"] # Enables advanced graph algorithms
    networks:
      - graphrag-network

volumes:
  neo4j_data:
  neo4j_logs:

networks:
  graphrag-network:
    driver: bridge